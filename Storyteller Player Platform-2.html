document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0e9e223d-9edd-48e5-83aa-24782d7befbb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"133cac58-8dc2-4b7d-88ba-3e9f228bdbe6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"da6a5b63-ca3a-4c21-96ba-6f9a774170da\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   Cisco Design System — Color tokens\n   Source of truth: Cisco brand portal (2026).\n   \"Roughly 80% of any execution should be anchored in White or\n   Midnight Blue.\" Use primaries generously; accents sparingly.\n   ============================================================ */\n\n:root {\n  /* ---- Primary palette (brand portal) ---------------------- */\n  --cisco-white:        #FFFFFF;   /* rgb(255,255,255)  CMYK 0/0/0/0      */\n  --cisco-midnight:     #07182D;   /* rgb(7,24,45)      PMS 296 C         */\n  --cisco-blue:         #02C8FF;   /* rgb(2,200,255)    PMS 306 C  (cyan) */\n  --cisco-medium-blue:  #0A60FF;   /* rgb(10,96,255)    PANTONE 285 C     */\n\n  /* ---- Extended blues (tints/shades for UI states) --------- */\n  --blue-700:           #0046C7;   /* pressed / deep medium-blue          */\n  --blue-600:           #0A60FF;   /* = medium blue (interactive default) */\n  --blue-500:           #2E7BFF;   /* hover lift                          */\n  --blue-200:           #A9CBFF;   /* subtle fills, borders               */\n  --blue-100:           #E1ECFF;   /* tinted surfaces                     */\n  --cyan-600:           #02C8FF;   /* = Cisco Blue (highlight / data viz) */\n  --cyan-200:           #9DECFF;\n  --cyan-100:           #E0F9FF;\n\n  /* ---- Neutral ramp (cool, tuned to Midnight Blue) --------- */\n  --neutral-0:          #FFFFFF;\n  --neutral-50:         #F5F7FA;\n  --neutral-100:        #EAEEF3;\n  --neutral-200:        #D6DEE7;\n  --neutral-300:        #B6C1CF;\n  --neutral-400:        #889AAE;\n  --neutral-500:        #5E7185;\n  --neutral-600:        #415063;\n  --neutral-700:        #2A3B4F;\n  --neutral-800:        #16263B;\n  --neutral-900:        #07182D;   /* = Midnight Blue                     */\n\n  /* ---- Semantic accents ------------------------------------ */\n  --green-500:          #1BA94C;   /* success / healthy / online          */\n  --green-100:          #E2F5E8;\n  --amber-500:          #FFB000;   /* warning / degraded                  */\n  --amber-100:          #FFF1D6;\n  --red-500:            #E5283C;   /* danger / offline / critical         */\n  --red-100:            #FCE3E6;\n  --teal-500:           #00B8A9;   /* secondary data-viz accent           */\n  --purple-500:         #7B5CFF;   /* tertiary data-viz accent            */\n\n  /* ============================================================\n     Semantic aliases — reference THESE in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:       var(--cisco-white);\n  --surface-card:       var(--cisco-white);\n  --surface-sunken:     var(--neutral-50);\n  --surface-raised:     var(--cisco-white);\n  --surface-inverse:    var(--cisco-midnight);   /* dark sections        */\n  --surface-brand:      var(--cisco-midnight);\n\n  /* Text */\n  --text-strong:        var(--cisco-midnight);\n  --text-body:          var(--neutral-700);\n  --text-muted:         var(--neutral-500);\n  --text-subtle:        var(--neutral-400);\n  --text-on-dark:       var(--cisco-white);\n  --text-on-dark-muted: #A7B6C9;\n  --text-link:          var(--cisco-medium-blue);\n  --text-link-on-dark:  var(--cisco-blue);\n\n  /* Borders / dividers */\n  --border-subtle:      var(--neutral-200);\n  --border-default:     var(--neutral-300);\n  --border-strong:      var(--neutral-400);\n  --border-on-dark:     rgba(255,255,255,0.16);\n  --border-focus:       var(--cisco-medium-blue);\n\n  /* Interactive */\n  --action-primary:        var(--cisco-medium-blue);\n  --action-primary-hover:  var(--blue-500);\n  --action-primary-press:  var(--blue-700);\n  --action-on-primary:     var(--cisco-white);\n\n  /* Status */\n  --status-online:      var(--green-500);\n  --status-warning:     var(--amber-500);\n  --status-critical:    var(--red-500);\n  --status-info:        var(--cisco-medium-blue);\n\n  /* Focus ring */\n  --focus-ring:         0 0 0 3px rgba(10,96,255,0.35);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Cisco Design System — Typography tokens\n   Brand typeface: Cisco Sans TT (sunsetting). Substituted here\n   with Hanken Grotesk. Hierarchy mirrors the brand type sheet:\n     H1  Medium 40pt          Body  Regular 16pt (default)\n     H2  Medium 24pt+         Hyperlink Regular, underlined\n     H3  Bold 20pt and under  Labels1 Regular 10–16pt\n     H4  Bold 16pt and under  Labels2 Bold <10pt\n     Subtitle1 Regular 16pt   Section title Regular 12pt\n   ============================================================ */\n\n:root {\n  /* ---- Families ------------------------------------------- */\n  --font-sans: 'Hanken Grotesk', 'Cisco Sans TT', -apple-system,\n               BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code',\n               ui-monospace, Menlo, Consolas, monospace;\n\n  /* ---- Weights -------------------------------------------- */\n  --weight-light:     300;\n  --weight-regular:   400;\n  --weight-medium:    500;\n  --weight-semibold:  600;\n  --weight-bold:      700;\n  --weight-extrabold: 800;\n\n  /* ---- Type scale (px; brand is pt-based, 1:1 mapping) ----- */\n  --text-display:   56px;   /* hero / oversized marketing       */\n  --text-h1:        40px;   /* H1  · Medium                     */\n  --text-h2:        28px;   /* H2  · Medium (24pt and above)    */\n  --text-h3:        20px;   /* H3  · Bold                       */\n  --text-h4:        16px;   /* H4  · Bold                       */\n  --text-subtitle:  18px;   /* Subtitle / lead body             */\n  --text-body:      16px;   /* Body · default                   */\n  --text-body-sm:   14px;\n  --text-label:     13px;   /* Labels 1                         */\n  --text-caption:   12px;   /* Section title                    */\n  --text-overline:  11px;   /* Labels 2 / eyebrows              */\n\n  /* ---- Line heights --------------------------------------- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ------------------------------------- */\n  --tracking-tight:   -0.02em;   /* large display/headings      */\n  --tracking-normal:  0;\n  --tracking-wide:    0.04em;\n  --tracking-overline: 0.12em;   /* uppercase eyebrows/labels   */\n\n  /* ---- Semantic roles ------------------------------------- */\n  --role-display: var(--weight-medium) var(--text-display)/var(--leading-tight) var(--font-sans);\n  --role-h1:      var(--weight-medium) var(--text-h1)/var(--leading-tight) var(--font-sans);\n  --role-h2:      var(--weight-medium) var(--text-h2)/var(--leading-snug) var(--font-sans);\n  --role-h3:      var(--weight-bold)   var(--text-h3)/var(--leading-snug) var(--font-sans);\n  --role-h4:      var(--weight-bold)   var(--text-h4)/var(--leading-snug) var(--font-sans);\n  --role-body:    var(--weight-regular) var(--text-body)/var(--leading-normal) var(--font-sans);\n  --role-label:   var(--weight-regular) var(--text-label)/var(--leading-snug) var(--font-sans);\n  --role-mono:    var(--weight-regular) var(--text-body-sm)/var(--leading-normal) var(--font-mono);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Cisco Design System — Spacing & sizing tokens\n   4px base grid. Cisco surfaces are airy and structured;\n   prefer generous whitespace and consistent rhythm.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* Layout */\n  --container-max:   1280px;\n  --container-text:  680px;   /* comfortable reading measure */\n  --gutter:          24px;\n  --section-y:       96px;    /* vertical padding for page sections */\n\n  /* Control sizing (min 44px touch targets where interactive) */\n  --control-height-sm: 32px;\n  --control-height-md: 40px;\n  --control-height-lg: 48px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Cisco Design System — Radius, borders, shadows, motion\n   Cisco's modern UI: restrained rounding (4–12px), crisp 1px\n   borders, soft cool-tinted shadows, quick confident easing.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radius -------------------------------------- */\n  --radius-xs:   3px;\n  --radius-sm:   6px;\n  --radius-md:   10px;   /* default cards / inputs / buttons   */\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-pill: 999px;  /* tags, status chips, pill buttons   */\n\n  /* ---- Border widths -------------------------------------- */\n  --border-hair: 1px;\n  --border-thick: 2px;\n\n  /* ---- Elevation (cool, midnight-tinted) ------------------ */\n  --shadow-xs:  0 1px 2px rgba(7,24,45,0.06);\n  --shadow-sm:  0 1px 3px rgba(7,24,45,0.08), 0 1px 2px rgba(7,24,45,0.06);\n  --shadow-md:  0 4px 12px rgba(7,24,45,0.10), 0 2px 4px rgba(7,24,45,0.06);\n  --shadow-lg:  0 12px 28px rgba(7,24,45,0.14), 0 4px 8px rgba(7,24,45,0.08);\n  --shadow-xl:  0 24px 56px rgba(7,24,45,0.18);\n  --shadow-focus: var(--focus-ring);\n\n  /* glow used on dark Midnight surfaces for Cisco-Blue accents */\n  --glow-cyan:  0 0 0 1px rgba(2,200,255,0.4), 0 0 24px rgba(2,200,255,0.25);\n\n  /* ---- Motion --------------------------------------------- */\n  --ease-standard:   cubic-bezier(0.2, 0, 0, 1);   /* @kind other */\n  --ease-emphasized: cubic-bezier(0.3, 0, 0, 1);   /* @kind other */\n  --ease-out:        cubic-bezier(0, 0, 0.2, 1);   /* @kind other */\n  --duration-fast:   120ms;   /* @kind other */\n  --duration-base:   200ms;   /* @kind other */\n  --duration-slow:   320ms;   /* @kind other */\n  --transition-base: all var(--duration-base) var(--ease-standard);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Cisco Design System — base element defaults\n   Lightweight, opt-in via the .cisco scope on specimen cards and\n   kits. Keeps global leakage low while giving sensible brand\n   defaults for typography and links.\n   ============================================================ */\n\n.cisco,\n.cisco *,\n.cisco *::before,\n.cisco *::after {\n  box-sizing: border-box;\n}\n\n.cisco {\n  font: var(--role-body);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.cisco h1, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   Cisco Design System — Color tokens\n   Source of truth: Cisco brand portal (2026).\n   \"Roughly 80% of any execution should be anchored in White or\n   Midnight Blue.\" Use primaries generously; accents sparingly.\n   ============================================================ */\n\n:root {\n  /* ---- Primary palette (brand portal) ---------------------- */\n  --cisco-white:        #FFFFFF;   /* rgb(255,255,255)  CMYK 0/0/0/0      */\n  --cisco-midnight:     #07182D;   /* rgb(7,24,45)      PMS 296 C         */\n  --cisco-blue:         #02C8FF;   /* rgb(2,200,255)    PMS 306 C  (cyan) */\n  --cisco-medium-blue:  #0A60FF;   /* rgb(10,96,255)    PANTONE 285 C     */\n\n  /* ---- Extended blues (tints/shades for UI states) --------- */\n  --blue-700:           #0046C7;   /* pressed / deep medium-blue          */\n  --blue-600:           #0A60FF;   /* = medium blue (interactive default) */\n  --blue-500:           #2E7BFF;   /* hover lift                          */\n  --blue-200:           #A9CBFF;   /* subtle fills, borders               */\n  --blue-100:           #E1ECFF;   /* tinted surfaces                     */\n  --cyan-600:           #02C8FF;   /* = Cisco Blue (highlight / data viz) */\n  --cyan-200:           #9DECFF;\n  --cyan-100:           #E0F9FF;\n\n  /* ---- Neutral ramp (cool, tuned to Midnight Blue) --------- */\n  --neutral-0:          #FFFFFF;\n  --neutral-50:         #F5F7FA;\n  --neutral-100:        #EAEEF3;\n  --neutral-200:        #D6DEE7;\n  --neutral-300:        #B6C1CF;\n  --neutral-400:        #889AAE;\n  --neutral-500:        #5E7185;\n  --neutral-600:        #415063;\n  --neutral-700:        #2A3B4F;\n  --neutral-800:        #16263B;\n  --neutral-900:        #07182D;   /* = Midnight Blue                     */\n\n  /* ---- Semantic accents ------------------------------------ */\n  --green-500:          #1BA94C;   /* success / healthy / online          */\n  --green-100:          #E2F5E8;\n  --amber-500:          #FFB000;   /* warning / degraded                  */\n  --amber-100:          #FFF1D6;\n  --red-500:            #E5283C;   /* danger / offline / critical         */\n  --red-100:            #FCE3E6;\n  --teal-500:           #00B8A9;   /* secondary data-viz accent           */\n  --purple-500:         #7B5CFF;   /* tertiary data-viz accent            */\n\n  /* ============================================================\n     Semantic aliases — reference THESE in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:       var(--cisco-white);\n  --surface-card:       var(--cisco-white);\n  --surface-sunken:     var(--neutral-50);\n  --surface-raised:     var(--cisco-white);\n  --surface-inverse:    var(--cisco-midnight);   /* dark sections        */\n  --surface-brand:      var(--cisco-midnight);\n\n  /* Text */\n  --text-strong:        var(--cisco-midnight);\n  --text-body:          var(--neutral-700);\n  --text-muted:         var(--neutral-500);\n  --text-subtle:        var(--neutral-400);\n  --text-on-dark:       var(--cisco-white);\n  --text-on-dark-muted: #A7B6C9;\n  --text-link:          var(--cisco-medium-blue);\n  --text-link-on-dark:  var(--cisco-blue);\n\n  /* Borders / dividers */\n  --border-subtle:      var(--neutral-200);\n  --border-default:     var(--neutral-300);\n  --border-strong:      var(--neutral-400);\n  --border-on-dark:     rgba(255,255,255,0.16);\n  --border-focus:       var(--cisco-medium-blue);\n\n  /* Interactive */\n  --action-primary:        var(--cisco-medium-blue);\n  --action-primary-hover:  var(--blue-500);\n  --action-primary-press:  var(--blue-700);\n  --action-on-primary:     var(--cisco-white);\n\n  /* Status */\n  --status-online:      var(--green-500);\n  --status-warning:     var(--amber-500);\n  --status-critical:    var(--red-500);\n  --status-info:        var(--cisco-medium-blue);\n\n  /* Focus ring */\n  --focus-ring:         0 0 0 3px rgba(10,96,255,0.35);\n}\n\n/* ============================================================\n   Cisco Design System — Typography tokens\n   Brand typeface: Cisco Sans TT (sunsetting). Substituted here\n   with Hanken Grotesk. Hierarchy mirrors the brand type sheet:\n     H1  Medium 40pt          Body  Regular 16pt (default)\n     H2  Medium 24pt+         Hyperlink Regular, underlined\n     H3  Bold 20pt and under  Labels1 Regular 10–16pt\n     H4  Bold 16pt and under  Labels2 Bold <10pt\n     Subtitle1 Regular 16pt   Section title Regular 12pt\n   ============================================================ */\n\n:root {\n  /* ---- Families ------------------------------------------- */\n  --font-sans: 'Hanken Grotesk', 'Cisco Sans TT', -apple-system,\n               BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code',\n               ui-monospace, Menlo, Consolas, monospace;\n\n  /* ---- Weights -------------------------------------------- */\n  --weight-light:     300;\n  --weight-regular:   400;\n  --weight-medium:    500;\n  --weight-semibold:  600;\n  --weight-bold:      700;\n  --weight-extrabold: 800;\n\n  /* ---- Type scale (px; brand is pt-based, 1:1 mapping) ----- */\n  --text-display:   56px;   /* hero / oversized marketing       */\n  --text-h1:        40px;   /* H1  · Medium                     */\n  --text-h2:        28px;   /* H2  · Medium (24pt and above)    */\n  --text-h3:        20px;   /* H3  · Bold                       */\n  --text-h4:        16px;   /* H4  · Bold                       */\n  --text-subtitle:  18px;   /* Subtitle / lead body             */\n  --text-body:      16px;   /* Body · default                   */\n  --text-body-sm:   14px;\n  --text-label:     13px;   /* Labels 1                         */\n  --text-caption:   12px;   /* Section title                    */\n  --text-overline:  11px;   /* Labels 2 / eyebrows              */\n\n  /* ---- Line heights --------------------------------------- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ------------------------------------- */\n  --tracking-tight:   -0.02em;   /* large display/headings      */\n  --tracking-normal:  0;\n  --tracking-wide:    0.04em;\n  --tracking-overline: 0.12em;   /* uppercase eyebrows/labels   */\n\n  /* ---- Semantic roles ------------------------------------- */\n  --role-display: var(--weight-medium) var(--text-display)/var(--leading-tight) var(--font-sans);\n  --role-h1:      var(--weight-medium) var(--text-h1)/var(--leading-tight) var(--font-sans);\n  --role-h2:      var(--weight-medium) var(--text-h2)/var(--leading-snug) var(--font-sans);\n  --role-h3:      var(--weight-bold)   var(--text-h3)/var(--leading-snug) var(--font-sans);\n  --role-h4:      var(--weight-bold)   var(--text-h4)/var(--leading-snug) var(--font-sans);\n  --role-body:    var(--weight-regular) var(--text-body)/var(--leading-normal) var(--font-sans);\n  --role-label:   var(--weight-regular) var(--text-label)/var(--leading-snug) var(--font-sans);\n  --role-mono:    var(--weight-regular) var(--text-body-sm)/var(--leading-normal) var(--font-mono);\n}\n\n/* ============================================================\n   Cisco Design System — Spacing & sizing tokens\n   4px base grid. Cisco surfaces are airy and structured;\n   prefer generous whitespace and consistent rhythm.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* Layout */\n  --container-max:   1280px;\n  --container-text:  680px;   /* comfortable reading measure */\n  --gutter:          24px;\n  --section-y:       96px;    /* vertical padding for page sections */\n\n  /* Control sizing (min 44px touch targets where interactive) */\n  --control-height-sm: 32px;\n  --control-height-md: 40px;\n  --control-height-lg: 48px;\n}\n\n/* ============================================================\n   Cisco Design System — Radius, borders, shadows, motion\n   Cisco's modern UI: restrained rounding (4–12px), crisp 1px\n   borders, soft cool-tinted shadows, quick confident easing.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radius -------------------------------------- */\n  --radius-xs:   3px;\n  --radius-sm:   6px;\n  --radius-md:   10px;   /* default cards / inputs / buttons   */\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-pill: 999px;  /* tags, status chips, pill buttons   */\n\n  /* ---- Border widths -------------------------------------- */\n  --border-hair: 1px;\n  --border-thick: 2px;\n\n  /* ---- Elevation (cool, midnight-tinted) ------------------ */\n  --shadow-xs:  0 1px 2px rgba(7,24,45,0.06);\n  --shadow-sm:  0 1px 3px rgba(7,24,45,0.08), 0 1px 2px rgba(7,24,45,0.06);\n  --shadow-md:  0 4px 12px rgba(7,24,45,0.10), 0 2px 4px rgba(7,24,45,0.06);\n  --shadow-lg:  0 12px 28px rgba(7,24,45,0.14), 0 4px 8px rgba(7,24,45,0.08);\n  --shadow-xl:  0 24px 56px rgba(7,24,45,0.18);\n  --shadow-focus: var(--focus-ring);\n\n  /* glow used on dark Midnight surfaces for Cisco-Blue accents */\n  --glow-cyan:  0 0 0 1px rgba(2,200,255,0.4), 0 0 24px rgba(2,200,255,0.25);\n\n  /* ---- Motion --------------------------------------------- */\n  --ease-standard:   cubic-bezier(0.2, 0, 0, 1);   /* @kind other */\n  --ease-emphasized: cubic-bezier(0.3, 0, 0, 1);   /* @kind other */\n  --ease-out:        cubic-bezier(0, 0, 0.2, 1);   /* @kind other */\n  --duration-fast:   120ms;   /* @kind other */\n  --duration-base:   200ms;   /* @kind other */\n  --duration-slow:   320ms;   /* @kind other */\n  --transition-base: all var(--duration-base) var(--ease-standard);\n}\n\n/* ============================================================\n   Cisco Design System — base element defaults\n   Lightweight, opt-in via the .cisco scope on specimen cards and\n   kits. Keeps global leakage low while giving sensible brand\n   defaults for typography and links.\n   ============================================================ */\n\n.cisco,\n.cisco *,\n.cisco *::before,\n.cisco *::after {\n  box-sizing: border-box;\n}\n\n.cisco {\n  font: var(--role-body);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.cisco h1, .cisco h2, .cisco h3, .cisco h4 {\n  color: var(--text-strong);\n  margin: 0;\n  text-wrap: balance;\n}\n.cisco h1 { font: var(--role-h1); letter-spacing: var(--tracking-tight); }\n.cisco h2 { font: var(--role-h2); letter-spacing: var(--tracking-tight); }\n.cisco h3 { font: var(--role-h3); }\n.cisco h4 { font: var(--role-h4); }\n\n.cisco p { margin: 0; text-wrap: pretty; }\n\n.cisco a {\n  color: var(--text-link);\n  text-decoration: underline;\n  text-underline-offset: 2px;\n  transition: color var(--duration-fast) var(--ease-standard);\n}\n.cisco a:hover { color: var(--action-primary-hover); }\n\n.cisco code, .cisco kbd, .cisco samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\n/* Eyebrow / overline helper */\n.cisco-overline {\n  font-size: var(--text-overline);\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--tracking-overline);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n<\u002Fstyle>\n  <script src=\"b12eb329-039f-404f-b6ca-342d9c663fdb\"><\u002Fscript>\n  <style>\n    html, body { margin: 0; padding: 0; background: #F5F7FA; }\n    body { font-family: var(--font-sans); color: var(--text-body); }\n    a { color: var(--text-link); text-decoration: none; }\n    a:hover { color: var(--blue-500); }\n    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n    @keyframes popIn { 0% { transform: scale(0.6); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }\n    @keyframes flipIn { 0% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }\n    @keyframes shakeRow { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(7px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }\n    @keyframes floatUp { 0% { opacity: 0; transform: translateY(8px) scale(0.8); } 15% { opacity: 1; transform: translateY(0) scale(1); } 75% { opacity: 1; } 100% { opacity: 0; transform: translateY(-26px); } }\n    @keyframes confettiFall { 0% { transform: translateY(-8vh) rotate(0deg); opacity: 1; } 85% { opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0; } }\n    @keyframes livePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(2,200,255,0.5); } 50% { box-shadow: 0 0 0 7px rgba(2,200,255,0); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:var(--neutral-50); display:flex; flex-direction:column;\">\n\n  <div style=\"height:4px; background:linear-gradient(90deg, #0A60FF 5%, #02C8FF 40%, #FF007F 75%, #FF9000 95%); flex-shrink:0;\"><\u002Fdiv>\n\n  <header data-screen-label=\"Player header\" style=\"background:var(--cisco-white); border-bottom:1px solid var(--border-subtle); height:60px; display:flex; align-items:center; gap:14px; padding:0 24px;\">\n    <img src=\"4b9d1948-ce60-4ef2-96d2-5f814e92477f\" alt=\"Cisco\" style=\"height:24px; display:block;\">\n    <div style=\"width:1px; height:22px; background:var(--border-subtle);\"><\u002Fdiv>\n    <div style=\"color:var(--text-strong); font:var(--weight-semibold) 15px/1 var(--font-sans);\">Storyteller word games<\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <sc-if value=\"{{ hasStreak }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px; border-radius:999px; background:var(--amber-100); color:#B87400; font:var(--weight-semibold) 13px/1 var(--font-sans);\">\n        <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z\"><\u002Fpath><\u002Fsvg>\n        {{ streakLabel }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <a href=\"{{ loginHref }}\" sc-camel-on-click=\"{{ loginClick }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 15px; border-radius:999px; background:linear-gradient(90deg, #0A60FF 5%, #02C8FF 40%, #FF007F 75%, #FF9000 95%); color:var(--cisco-white); font:var(--weight-bold) 14px/1 var(--font-sans); box-shadow:0 2px 10px rgba(10,96,255,0.3); text-decoration:none; transition:transform 120ms, box-shadow 120ms;\" style-hover=\"transform:translateY(-1px); box-shadow:0 4px 14px rgba(10,96,255,0.4); color:var(--cisco-white); text-decoration:none;\">\n      <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2\"><\u002Fpolygon><\u002Fsvg>\n      My points on Sprinklr\n    <\u002Fa>\n  <\u002Fheader>\n\n  <main style=\"width:100%; max-width:820px; margin:0 auto; padding:32px 20px 72px; box-sizing:border-box; display:flex; flex-direction:column; gap:24px; flex:1;\">\n\n    <sc-if value=\"{{ noGame }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"No game live\" style=\"background:var(--cisco-white); border:1px solid var(--border-subtle); border-radius:20px; padding:64px 32px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:var(--shadow-sm); margin-top:24px;\">\n        <div style=\"width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg, #0A60FF, #02C8FF); display:flex; align-items:center; justify-content:center; color:var(--cisco-white);\">\n          <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v3\"><\u002Fpath><path d=\"M18.4 5.6l-2.1 2.1\"><\u002Fpath><path d=\"M21 12h-3\"><\u002Fpath><path d=\"M18.4 18.4l-2.1-2.1\"><\u002Fpath><path d=\"M12 21v-3\"><\u002Fpath><path d=\"M5.6 18.4l2.1-2.1\"><\u002Fpath><path d=\"M3 12h3\"><\u002Fpath><path d=\"M5.6 5.6l2.1 2.1\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h1 style=\"margin:0; font:var(--weight-medium) 28px/1.2 var(--font-sans); color:var(--text-strong); letter-spacing:-0.02em;\">Nothing to play right now<\u002Fh1>\n        <p style=\"margin:0; max-width:400px; font:400 15px/1.55 var(--font-sans); color:var(--text-muted);\">Check back soon. A new word game drops here the moment the team publishes one.<\u002Fp>\n        <div style=\"display:inline-flex; align-items:center; height:28px; padding:0 14px; border-radius:999px; background:var(--neutral-50); border:1px solid var(--border-subtle); font:var(--weight-semibold) 13px/1 var(--font-sans); color:var(--text-muted);\">Your points live on Sprinklr<\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasGame }}\" hint-placeholder-val=\"{{ true }}\">\n\n      <section data-screen-label=\"Campaign hero\" style=\"background:var(--cisco-midnight); bord  gap:14px;\">\n          <div style=\"width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--cisco-white); background:{{ summaryBadgeBg }};\">\n            <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h2 style=\"margin:0; font:var(--weight-medium) 26px/1.2 var(--font-sans); color:var(--text-strong); letter-spacing:-0.01em;\">{{ summaryTitle }}<\u002Fh2>\n          <p style=\"margin:0; max-width:420px; font:400 15px/1.55 var(--font-sans); color:var(--text-muted);\">{{ summaryBody }}<\u002Fp>\n          <a href=\"{{ loginHref }}\" sc-camel-on-click=\"{{ loginClick }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:10px; height:52px; padding:0 30px; border-radius:12px; background:linear-gradient(90deg, #0A60FF, #02C8FF); color:var(--cisco-white); font:var(--weight-bold) 16px/1 var(--font-sans); text-decoration:none; box-shadow:0 4px 14px rgba(10,96,255,0.35); transition:transform 120ms, box-shadow 120ms; margin-top:6px;\" style-hover=\"transform:translateY(-1px); box-shadow:0 6px 20px rgba(10,96,255,0.45); color:var(--cisco-white); text-decoration:none;\">\n            {{ summaryCta }}\n            <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n          <div style=\"display:inline-flex; align-items:center; gap:8px; font:var(--weight-medium) 13px/1.4 var(--font-sans); color:var(--text-muted); margin-top:4px;\">\n            <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg>\n            Come back tomorrow to keep your streak alive with a new game.\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n    <\u002Fsc-if>\n\n    <div style=\"text-align:center; font:400 12px/1.6 var(--font-sans); color:var(--text-subtle); max-width:520px; margin:8px auto 0;\">\n      No sign-in needed to play. Your progress saves to this device ({{ anonLabel }}). Points are tracked and redeemed on Sprinklr, so log in to Cisco Advocacy to see your balance.\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ showResult }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Result overlay\" style=\"position:fixed; inset:0; background:rgba(7,24,45,0.6); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; padding:24px; z-index:50;\">\n      {{ confettiEl }}\n      <div style=\"position:relative; background:var(--cisco-white); border-radius:24px; padding:44px 40px 36px; max-width:460px; width:100%; box-shadow:var(--shadow-xl); display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; animation:popIn 360ms cubic-bezier(0.2,0,0,1) both;\">\n        <div style=\"width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--cisco-white); background:{{ resultBadgeBg }}; box-shadow:0 6px 22px rgba(10,96,255,0.3);\">\n          <sc-if value=\"{{ resultWin }}\" hint-placeholder-val=\"{{ true }}\">\n            <svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ resultLoss }}\" hint-placeholder-val=\"{{ false }}\">\n            <svg width=\"32\" height=\"32\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 15s1.5-2 4-2 4 2 4 2\"><\u002Fpath><path d=\"M9 9h.01\"><\u002Fpath><path d=\"M15 9h.01\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <h2 style=\"margin:0; font:var(--weight-extrabold) 30px/1.1 var(--font-sans); letter-spacing:-0.02em; background:linear-gradient(90deg, #0A60FF 5%, #02C8FF 40%, #FF007F 75%, #FF9000 95%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;\">{{ resultTitle }}<\u002Fh2>\n        <div style=\"display:flex; flex-direction:column; gap:8px; align-items:center;\">\n          <div style=\"font:400 14px/1.4 var(--font-sans); color:var(--text-muted);\">The word was<\u002Fdiv>\n          <div style=\"display:flex; gap:5px;\">\n            <sc-for list=\"{{ revealTiles }}\" as=\"rt\" hint-placeholder-count=\"0\">\n              <div style=\"width:38px; height:38px; border-radius:7px; background:var(--cisco-midnight); color:var(--cisco-white); display:flex; align-items:center; justify-content:center; font:var(--weight-bold) 17px/1 var(--font-mono);\">{{ rt.ch }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 18px; border-radius:999px; background:var(--blue-100); font:var(--weight-extrabold) 16px/1 var(--font-sans); color:var(--cisco-medium-blue); animation:popIn 400ms cubic-bezier(0.2,0,0,1) 250ms both;\">\n          <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"><polygon points=\"12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2\"><\u002Fpolygon><\u002Fsvg>\n          Points earned\n        <\u002Fdiv>\n        <p style=\"margin:0; font:400 14px/1.55 var(--font-sans); color:var(--text-muted); max-width:340px;\">{{ resultBody }}<\u002Fp>\n        <a href=\"{{ loginHref }}\" sc-camel-on-click=\"{{ loginClick }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; align-items:center; justify-content:center; gap:10px; height:54px; width:100%; border-radius:12px; background:linear-gradient(90deg, #0A60FF, #02C8FF); color:var(--cisco-white); font:var(--weight-bold) 16px/1 var(--font-sans); text-decoration:none; box-shadow:0 4px 16px rgba(10,96,255,0.35); transition:transform 120ms, box-shadow 120ms; box-sizing:border-box;\" style-hover=\"transform:translateY(-1px); box-shadow:0 6px 22px rgba(10,96,255,0.45); color:var(--cisco-white); text-decoration:none;\">\n          {{ resultCta }}\n          <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <div style=\"display:inline-flex; align-items:center; gap:7px; font:var(--weight-medium) 12px/1.4 var(--font-sans); color:var(--text-subtle);\">\n          <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n          Takes a few seconds. Your points are waiting on the other side.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;pollSeconds&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 1, &quot;max&quot;: 30, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Sync&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    game: null,\n    loaded: false,\n    // identity / streak\n    streak: 0,\n    anonId: '',\n    // completion\n    done: null,          // {result:'win'|'loss', pts}\n    showResult: false,\n    resultFresh: false,  // just finished this session (confetti)\n    // word search\n    triesLeft: 3,\n    dragging: false,\n    selCells: [],\n    foundCells: [],\n    revealCells: [],\n    // wordle\n    guesses: [],\n    current: '',\n    keyStatus: {},\n    shakeRow: -1,\n    revealRow: -1,\n  };\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    // anonymous device identity\n    let anonId = '';\n    try {\n      anonId = localStorage.getItem('st-anon-id') || '';\n      if (!anonId) {\n        anonId = 'p-' + Math.random().toString(36).slice(2, 8);\n        localStorage.setItem('st-anon-id', anonId);\n      }\n    } catch (e) {}\n    const streak = this.readInt('st-streak', 0);\n    this.setState({ anonId, streak });\n\n    // funnel: count landings from the campaign email link (?src=email), once per page load\n    try {\n      if (new URLSearchParams(window.location.search).get('src') === 'email') this.bump('st-funnel-link-clicks');\n    } catch (e) {}\n\n    this.loadGame(true);\n    const poll = Math.max(1, this.props.pollSeconds ?? 3) * 1000;\n    this._poll = setInterval(() => this.loadGame(false), poll);\n    this._onStorage = (e) => { if (e.key === 'storyteller-active-game') this.loadGame(false); };\n    window.addEventListener('storage', this._onStorage);\n    this._onKey = (e) => this.handleKey(e);\n    document.addEventListener('keydown', this._onKey);\n    this._onMouseUp = () => this.endDrag();\n    document.addEventListener('mouseup', this._onMouseUp);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._poll);\n    window.removeEventListener('storage', this._onStorage);\n    document.removeEventListener('keydown', this._onKey);\n    document.removeEventListener('mouseup', this._onMouseUp);\n    if (this._raf) cancelAnimationFrame(this._raf);\n  }\n\n  readInt(k, d) { try { const v = parseInt(localStorage.getItem(k), 10); return isNaN(v) ? d : v; } catch (e) { return d; } }\n\n  bump(k) {\n    try { localStorage.setItem(k, String((parseInt(localStorage.getItem(k), 10) || 0) + 1)); } catch (e) {}\n    // Mirror to the site API when deployed with the Netlify function; silently skipped elsewhere\n    const ev = { 'st-funnel-link-clicks': 'click', 'st-funnel-completions-correct': 'win', 'st-funnel-completions-failed': 'fail', 'st-funnel-login-clicks': 'login' }[k];\n    if (ev && !this._noApi) {\n      try { fetch('/api/track', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ event: ev }) }).catch(() => {}); } catch (e) {}\n    }\n  }\n\n  decodeShare(s) {\n    try { return JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g, '+').replace(/_/g, '/'))))); }\n    catch (e) { return null; }\n  }\n\n  loadGame(first) {\n    // Prefer the site's game feed (Netlify function); fall back to the share link / local storage when it isn't there\n    if (this._noApi) { this.loadLocal(first); return; }\n    let p;\n    try { p = fetch('/api/game', { headers: { accept: 'application/json' } }); } catch (e) { this._noApi = true; this.loadLocal(first); return; }\n    p.then((r) => { if (!r.ok) throw 0; return r.json(); })\n      .then((game) => {\n        this._apiOk = true;\n        if (game && game.gameId) this.applyGame(game, first);\n        else this.loadLocal(first);\n      })\n      .catch(() => {\n        if (!this._apiOk) this._noApi = true;\n        this.loadLocal(first);\n      });\n  }\n\n  loadLocal(first) {\n    let game = null;\n    // A game carried in the link (#g=...) wins over local storage, so emailed links work on any static host\n    try {\n      const h = window.location.hash;\n      if (h && h.indexOf('#g=') === 0) game = this.decodeShare(h.slice(3));\n    } catch (e) {}\n    if (game) {\n      try { localStorage.setItem('storyteller-active-game', JSON.stringify(game)); } catch (e) {}\n    } else try {\n      const raw = localStorage.getItem('storyteller-active-game');\n      if (raw) game = JSON.parse(raw);\n    } catch (e) {}\n    this.applyGame(game, first);\n  }\n\n  applyGame(game, first) {\n    const prev = this.state.game;\n    const changed = (game ? game.gameId : null) !== (prev ? prev.gameId : null);\n    if (!changed && !first) return;\n    let done = null;\n    if (game) {\n      try {\n        const rec = localStorage.getItem('st-done-' + game.gameId);\n        if (rec) done = JSON.parse(rec);\n      } catch (e) {}\n    }\n    this.setState({\n      game, loaded: true, done,\n      showResult: false, resultFresh: false,\n      triesLeft: 3, dragging: false, selCells: [], foundCells: [], revealCells: [],\n      guesses: [], current: '', keyStatus: {}, shakeRow: -1, revealRow: -1,\n    });\n    this._confetti = null;\n  }\n\n  playing() {\n    return this.state.game && !this.state.done;\n  }\n\n  // ---------- completion / streak ----------\n  finish(result) {\n    const g = this.state.game;\n    if (!g || this.state.done) return;\n    const done = { result, at: new Date().toISOString() };\n    // streak\n    const today = new Date().toISOString().slice(0, 10);\n    let last = '', streak = this.state.streak;\n    try { last = localStorage.getItem('st-last-day') || ''; } catch (e) {}\n    if (last !== today) {\n      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);\n      streak = last === y ? streak + 1 : 1;\n    }\n    try {\n      localStorage.setItem('st-done-' + g.gameId, JSON.stringify(done));\n      localStorage.setItem('st-streak', String(streak));\n      localStorage.setItem('st-last-day', today);\n    } catch (e) {}\n    // funnel: anyone reaching a result screen counts as a completion\n    this.bump(result === 'win' ? 'st-funnel-completions-correct' : 'st-funnel-completions-failed');\n    if (result === 'win') this._confetti = this.makeConfetti();\n    this.setState({ done, streak, showResult: true, resultFresh: true });\n  }\n\n  // ---------- word search ----------\n  lineBetween(a, b) {\n    const dr = Math.sign(b[0] - a[0]), dc = Math.sign(b[1] - a[1]);\n    const nr = Math.abs(b[0] - a[0]), nc = Math.abs(b[1] - a[1]);\n    if (dr !== 0 && dc !== 0 && nr !== nc) return null;\n    const n = Math.max(nr, nc);\n    const cells = [];\n    for (let i = 0; i <= n; i++) cells.push([a[0] + dr * i, a[1] + dc * i]);\n    return cells;\n  }\n\n  startDrag(r, c) {\n    if (!this.playing()) return;\n    this._anchor = [r, c];\n    this.setState({ dragging: true, selCells: [[r, c]] });\n  }\n\n  extendDrag(r, c) {\n    if (!this.state.dragging || !this._anchor) return;\n    const line = this.lineBetween(this._anchor, [r, c]);\n    if (line) this.setState({ selCells: line });\n  }\n\n  endDrag() {\n    if (!this.state.dragging) return;\n    const g = this.state.game;\n    const sel = this.state.selCells;\n    this.setState({ dragging: false });\n    if (!g || !sel.length) { this.setState({ selCells: [] }); return; }\n    const str = sel.map(([r, c]) => g.grid[r][c]).join('');\n    const rev = str.split('').reverse().join('');\n    if (str === g.word || rev === g.word) {\n      this.setState({ foundCells: sel, selCells: [] });\n      this.finish('win');\n    } else if (sel.length >= 2) {\n      // a released wrong selection of 2+ letters uses a try\n      const triesLeft = this.state.triesLeft - 1;\n      if (triesLeft <= 0) {\n        this.setState({ triesLeft: 0, selCells: [], revealCells: g.wordCells || [] });\n        this.finish('loss');\n      } else {\n        this.setState({ triesLeft, selCells: [] });\n      }\n    } else {\n      this.setState({ selCells: [] });\n    }\n  }\n\n  cellFromTouch(e) {\n    const t = e.touches && e.touches[0];\n    if (!t) return null;\n    const el = document.elementFromPoint(t.clientX, t.clientY);\n    const node = el && el.closest ? el.closest('[data-rc]') : null;\n    if (!node) return null;\n    return node.getAttribute('data-rc').split(',').map(Number);\n  }\n\n  giveUp = () => {\n    const g = this.state.game;\n    if (!this.playing() || g.gameType !== 'wordsearch') return;\n    this.setState({ revealCells: g.wordCells || [] });\n    this.finish('loss');\n  };\n\n  // ---------- wordle ----------\n  handleKey(e) {\n    const g = this.state.game;\n    if (!this.playing() || !g || g.gameType !== 'wordle') return;\n    if (e.metaKey || e.ctrlKey || e.altKey) return;\n    if (e.key === 'Enter') this.submitGuess();\n    else if (e.key === 'Backspace') this.typeKey('BACK');\n    else if (/^[a-zA-Z]$/.test(e.key)) this.typeKey(e.key.toUpperCase());\n  }\n\n  typeKey(k) {\n    if (!this.playing()) return;\n    const cur = this.state.current;\n    if (k === 'BACK') { this.setState({ current: cur.slice(0, -1) }); return; }\n    if (k === 'ENTER') { this.submitGuess(); return; }\n    if (cur.length < 5) this.setState({ current: cur + k });\n  }\n\n  submitGuess() {\n    const g = this.state.game;\n    const cur = this.state.current;\n    if (cur.length !== 5) {\n      const row = this.state.guesses.length;\n      this.setState({ shakeRow: row });\n      setTimeout(() => this.setState({ shakeRow: -1 }), 500);\n      return;\n    }\n    const target = g.word;\n    const status = Array(5).fill('absent');\n    const remain = {};\n    for (let i = 0; i < 5; i++) {\n      if (cur[i] === target[i]) status[i] = 'correct';\n      else remain[target[i]] = (remain[target[i]] || 0) + 1;\n    }\n    for (let i = 0; i < 5; i++) {\n      if (status[i] === 'correct') continue;\n      if (remain[cur[i]] > 0) { status[i] = 'present'; remain[cur[i]]--; }\n    }\n    const keyStatus = { ...this.state.keyStatus };\n    const rank = { absent: 0, present: 1, correct: 2 };\n    for (let i = 0; i < 5; i++) {\n      const k = cur[i];\n      if (!keyStatus[k] || rank[status[i]] > rank[keyStatus[k]]) keyStatus[k] = status[i];\n    }\n    const guesses = [...this.state.guesses, { word: cur, status }];\n    const won = cur === target;\n    const max = g.maxGuesses || 5;\n    this.setState({ guesses, current: '', keyStatus, revealRow: guesses.length - 1 });\n    if (won || guesses.length >= max) {\n      setTimeout(() => this.finish(won ? 'win' : 'loss'), 1300);\n    }\n  }\n\n  // ---------- confetti ----------\n  makeConfetti() {\n    const colors = ['#0A60FF', '#02C8FF', '#FF007F', '#FF9000', '#FFFFFF'];\n    const pieces = [];\n    for (let i = 0; i < 90; i++) {\n      const w = 6 + Math.random() * 7;\n      pieces.push(React.createElement('div', {\n        key: i,\n        style: {\n          position: 'absolute',\n          left: (Math.random() * 100) + '%',\n          top: '-4vh',\n          width: w + 'px',\n          height: (w * (0.4 + Math.random() * 0.8)) + 'px',\n          borderRadius: Math.random() > 0.5 ? '50%' : '2px',\n          background: colors[i % colors.length],\n          animation: 'confettiFall ' + (2.4 + Math.random() * 2.2) + 's linear ' + (Math.random() * 0.9) + 's both',\n        },\n      }));\n    }\n    return React.createElement('div', {\n      style: { position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' },\n    }, pieces);\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const s = this.state;\n    const g = s.game;\n    const hasGame = !!g;\n    const done = s.done;\n    const isWS = hasGame && g.gameType === 'wordsearch';\n    const isWD = hasGame && g.gameType === 'wordle';\n\n    // ----- word search cells -----\n    const selKey = new Set(s.selCells.map((x) => x.join(',')));\n    const foundKey = new Set(s.foundCells.map((x) => x.join(',')));\n    const revealKey = new Set(s.revealCells.map((x) => x.join(',')));\n    const wsCells = [];\n    let gridCols = 10, cellPx = 46, cellFont = 18;\n    if (isWS && g.grid) {\n      gridCols = g.gridSize || g.grid.length;\n      cellPx = gridCols > 11 ? 38 : 46;\n      cellFont = gridCols > 11 ? 15 : 18;\n      g.grid.forEach((row, r) => row.forEach((ch, c) => {\n        const key = r + ',' + c;\n        let bg = 'var(--neutral-50)', color = 'var(--text-strong)', tf = 'scale(1)';\n        if (foundKey.has(key)) { bg = 'linear-gradient(135deg, #0A60FF 5%, #02C8FF 45%, #FF007F 100%)'; color = '#FFFFFF'; tf = 'scale(1.06)'; }\n        else if (revealKey.has(key)) { bg = 'var(--amber-100)'; color = '#B87400'; }\n        else if (selKey.has(key)) { bg = 'linear-gradient(135deg, #0A60FF, #02C8FF)'; color = '#FFFFFF'; tf = 'scale(1.05)'; }\n        wsCells.push({\n          ch, rc: key, bg, color, tf,\n          down: () => this.startDrag(r, c),\n          enter: () => this.extendDrag(r, c),\n          up: () => this.endDrag(),\n        });\n      }));\n    }\n    // ----- wordle rows -----\n    const wdRows = [];\n    const kbRows = [];\n    let maxG = 5;\n    if (isWD) {\n      maxG = g.maxGuesses || 5;\n      const colorFor = (st) => st === 'correct' ? { bg: 'var(--green-500)', border: 'var(--green-500)', color: '#FFFFFF' }\n        : st === 'present' ? { bg: 'var(--amber-500)', border: 'var(--amber-500)', color: '#FFFFFF' }\n        : { bg: 'var(--neutral-400)', border: 'var(--neutral-400)', color: '#FFFFFF' };\n      for (let r = 0; r < maxG; r++) {\n        const tiles = [];\n        const past = s.guesses[r];\n        const isCur = !done && r === s.guesses.length;\n        for (let i = 0; i < 5; i++) {\n          if (past) {\n            const cs = colorFor(past.status[i]);\n            tiles.push({ ch: past.word[i], bg: cs.bg, border: cs.border, color: cs.color,\n              anim: r === s.revealRow ? 'flipIn 380ms ease ' + (i * 90) + 'ms backwards' : 'none' });\n          } else if (isCur && i < s.current.length) {\n            tiles.push({ ch: s.current[i], bg: 'var(--cisco-white)', border: 'var(--neutral-400)', color: 'var(--text-strong)', anim: 'popIn 120ms ease both' });\n          } else {\n            tiles.push({ ch: '', bg: 'var(--cisco-white)', border: isCur ? 'var(--blue-200)' : 'var(--border-subtle)', color: 'var(--text-strong)', anim: 'none' });\n          }\n        }\n        wdRows.push({ tiles, anim: r === s.shakeRow ? 'shakeRow 450ms ease' : 'none' });\n      }\n      const layout = ['QWERTYUIOP', 'ASDFGHJKL', '#ZXCVBNM<'];\n      layout.forEach((rowStr) => {\n        const keys = [];\n        rowStr.split('').forEach((ch) => {\n          const isEnter = ch === '#', isBack = ch === '<';\n          const st = s.keyStatus[ch];\n          let bg = 'var(--neutral-100)', color = 'var(--text-strong)';\n          if (st === 'correct') { bg = 'var(--green-500)'; color = '#FFFFFF'; }\n          else if (st === 'present') { bg = 'var(--amber-500)'; color = '#FFFFFF'; }\n          else if (st === 'absent') { bg = 'var(--neutral-400)'; color = '#FFFFFF'; }\n          keys.push({\n            label: isEnter ? 'Enter' : isBack ? '⌫' : ch,\n            w: isEnter || isBack ? 62 : 38,\n            fs: isEnter ? 12 : 15,\n            bg, color,\n            click: () => this.typeKey(isEnter ? 'ENTER' : isBack ? 'BACK' : ch),\n          });\n        });\n        kbRows.push({ keys });\n      });\n    }\n\n    // ----- result / summary -----\n    const win = done && done.result === 'win';\n    const heroGrad = 'linear-gradient(135deg, #0A60FF 5%, #02C8FF 40%, #FF007F 80%)';\n\n    return {\n      // header\n      hasStreak: s.streak > 1,\n      streakLabel: s.streak + '-day streak',\n      anonLabel: s.anonId || 'this device',\n\n      // states\n      noGame: s.loaded && !hasGame,\n      hasGame,\n      showBoard: hasGame && !done,\n      showSummary: hasGame && !!done && !s.showResult,\n      showResult: s.showResult,\n\n      // hero\n      headline: hasGame ? g.headline : '',\n      rules: hasGame ? g.rules : '',\n      gameTypeLabel: isWS ? 'Word search' : 'Wordle',\n      howToSubtitle: isWS\n        ? 'Find the hidden ' + (hasGame ? g.word.length : 0) + '-letter word in the grid.'\n        : 'Guess the word in ' + maxG + ' tries. Each guess must be 5 letters.',\n\n      // word search\n      isWordsearch: isWS,\n      wsCells, gridCols, cellPx, cellFont,\n      wordLen: hasGame ? g.word.length : 0,\n      triesLabel: s.triesLeft === 1 ? 'Last try' : s.triesLeft + ' tries left',\n      triesTextColor: s.triesLeft === 1 ? 'var(--red-500)' : 'var(--text-strong)',\n      triesDots: [0, 1, 2].map((i) => ({\n        bg: i < s.triesLeft ? 'linear-gradient(135deg, #0A60FF, #02C8FF)' : 'var(--neutral-300)',\n        tf: i < s.triesLeft ? 'scale(1)' : 'scale(0.75)',\n      })),\n      giveUp: this.giveUp,\n      gridLeave: () => {},\n      touchStart: (e) => { const rc = this.cellFromTouch(e); if (rc) this.startDrag(rc[0], rc[1]); },\n      touchMove: (e) => { const rc = this.cellFromTouch(e); if (rc) this.extendDrag(rc[0], rc[1]); },\n      touchEnd: () => this.endDrag(),\n\n      // wordle\n      isWordle: isWD,\n      wdRows, kbRows,\n      guessesLeftLabel: isWD ? (maxG - s.guesses.length) + ' of ' + maxG + ' guesses left' : '',\n\n      // result overlay\n      confettiEl: win && s.resultFresh ? this._confetti : null,\n      resultWin: !!win,\n      resultLoss: !!(done && !win),\n      resultBadgeBg: win ? heroGrad : 'var(--neutral-400)',\n      resultTitle: win ? 'You cracked it!' : 'So close!',\n      revealTiles: hasGame ? g.word.split('').map((ch) => ({ ch })) : [],\n      resultBody: win\n        ? 'Your points are waiting. Log in to Cisco Advocacy and they land in your account, right where the rewards live.'\n        : 'You still earned points for playing. Log in to Cisco Advocacy to claim them, and come back tomorrow for a fresh shot.',\n      resultCta: win ? 'Log in to redeem your points' : 'Log in to claim your points',\n      loginHref: 'https://ciscoadvocacy.sprinklr.com/login?utm_source=wordgame&utm_campaign=storyteller_q3&utm_content=gamification',\n      loginClick: () => this.bump('st-funnel-login-clicks'),\n\n      // summary card\n      summaryBadgeBg: win ? heroGrad : 'var(--neutral-400)',\n      summaryTitle: win ? 'You cracked today\\'s game' : 'You played today\\'s game',\n      summaryBody: done\n        ? 'You earned points' + (win ? '' : ' for playing') + '. Log in to Cisco Advocacy to bank them, and check back tomorrow for the next game.'\n        : '',\n      summaryCta: win ? 'Log in to redeem your points' : 'Log in to claim your points',\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
